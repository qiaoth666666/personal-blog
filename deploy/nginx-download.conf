# =====================================================
# Nginx 下载配置 —— 零拷贝 sendfile()
#
# 用法：把下面 location 块加到你的 server {} 中
# 然后在服务器 .env 中设置:
#   NGINX_DOWNLOAD_PREFIX=/protected-downloads
# =====================================================

# 内部重定向：外部用户不能直接访问 /protected-downloads/
# 只能由 Next.js API 通过 X-Accel-Redirect 头内部转发
location /protected-downloads/ {
    internal;
    alias /home/你的用户名/个人博客开发/personal-blog/public/downloads/;

    # 零拷贝：sendfile 直接从磁盘推到 socket，不走用户态内存
    sendfile on;
    sendfile_max_chunk 512k;

    # 并发限制（按 IP 限制同时下载连接数）
    limit_conn download_conn 3;
}

# 需要在 http 块中定义 limit_conn_zone（通常在 nginx.conf 的 http {} 里）:
# limit_conn_zone $binary_remote_addr zone=download_conn:10m;
